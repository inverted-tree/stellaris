{{ define "main" }}
<div>
  <header class="section-header">
    <h1 class="section-title">{{ .Title }}</h1>
    {{ with .Content }}
    <div class="prose">{{ . }}</div>
    {{ end }}
  </header>

  <div class="taxonomy-list">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}" class="taxonomy-tag">
      {{ .Page.Title }}
      <span class="taxonomy-tag-count">{{ .Count }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
