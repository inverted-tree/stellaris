<a href="{{ "/" | relURL }}" class="site-logo">{{ site.Title }}</a>

<div class="topbar-spacer"></div>

<nav class="topbar-links" aria-label="Main navigation">
  {{ with site.GetPage "/projects" }}
  <a href="{{ .RelPermalink }}" class="topbar-link">Projects</a>
  {{ end }}
  {{ with site.GetPage "/posts" }}
  <a href="{{ .RelPermalink }}" class="topbar-link">Posts</a>
  {{ end }}
  <a href="{{ "/tags/" | relURL }}" class="topbar-link">Tags</a>
</nav>

<button class="sidebar-toggle-btn" aria-label="Toggle navigation" onclick="document.getElementById('sidebar-toggle').checked = !document.getElementById('sidebar-toggle').checked">
  <span></span>
  <span></span>
  <span></span>
</button>
