<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
{{ with .Description }}<meta name="description" content="{{ . }}">
{{ else }}{{ with site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
{{ end }}
<meta name="color-scheme" content="dark">
{{ partial "head/css.html" . }}
<style>:root{
{{- with site.Params.accentColor }}--accent:{{ . }};{{ end }}
{{- with site.Params.fontSans }}--font-sans:'{{ . }}',system-ui,-apple-system,sans-serif;{{ end }}
{{- with site.Params.fontMono }}--font-mono:'{{ . }}',ui-monospace,"SFMono-Regular",Consolas,monospace;{{ end }}
}</style>
{{ if .Param "math" }}{{ partialCached "math.html" . }}{{ end }}
{{ partial "head/js.html" . }}
