baseURL = 'https://example.org/'
languageCode = 'en-US'
title = 'Stellaris'

[params]
  description = 'A minimal Hugo theme for technical writing — dark, opinionated, and easy to configure.'
  heroTitle = 'your next Hugo site.'
  accentColor = '#f97316'  # theme accent — change to any CSS color
  featuredProject = 'ray-tracer'  # slug of the project to feature on the home page

[taxonomies]
  tag = 'tags'

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block  = [['$$', '$$'], ['\[', '\]']]
          inline = [['$', '$'], ['\(', '\)']]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
